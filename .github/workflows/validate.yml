name: Validate Runbooks

on:
  pull_request:
    paths:
      - "examples/**/*.md"
      - "examples/*.md"

jobs:
  validate:
    name: Validate example runbooks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install runbook-exec
        run: pip install -e ".[dev]"

      - name: Validate all example runbooks
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          for f in examples/*.md; do
            echo "Validating $f..."
            runbook-exec validate "$f"
          done
